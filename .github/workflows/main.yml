name: 24/7 Sleep Stream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Guaranteed Working Files
        run: |
          # Clean up any old files first
          rm -f audio.mp3 background.jpg
          
          # Download audio (Proven source)
          wget -O audio.mp3 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
          
          # Download image (Quoted URL to prevent shell errors)
          wget -O background.jpg 'https://images.unsplash.com/photo-1470252649358-96940c9353d9?q=80&w=1280&h=720&auto=format&fit=crop'
          
          # Check if files are actually there and have size
          ls -lh background.jpg audio.mp3

      - name: Start Infinite Stream
        run: |
          ffmpeg -re -loop 1 -i background.jpg -i audio.mp3 \
          -c:v libx264 -preset superfast -tune stillimage -b:v 2500k \
          -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 -shortest \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
