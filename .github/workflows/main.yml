name: 24/7 Sleep Stream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video
        run: wget -O sleep_video.mp4 'https://github.com/intel-iot-devkit/sample-videos/raw/master/classroom.mp4'

      - name: Start Infinite Stream
        run: |
          ffmpeg -re -stream_loop -1 -i sleep_video.mp4 \
          -vcodec libx264 -preset veryfast -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -acodec aac -b:a 128k -ar 44100 \
          -f flv "rtmps://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
