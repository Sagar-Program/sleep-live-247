name: 24/7 Sleep Stream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate and Stream
        run: |
          ffmpeg -re -loop 1 -i background.jpg -i audio.mp3 \
          -c:v libx264 -preset superfast -tune stillimage -pix_fmt yuv420p \
          -shortest -strict -2 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
