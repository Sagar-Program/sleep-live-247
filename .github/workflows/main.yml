name: 24/7 Custom Sleep Stream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify Files
        run: |
          ls -lh background.jpg audio.mp3 || echo "FILES MISSING! Make sure you uploaded background.jpg and audio.mp3"

      - name: Start Infinite Stream
        run: |
          ffmpeg -re -loop 1 -i background.jpg -i audio.mp3 \
          -c:v libx264 -preset superfast -tune stillimage -b:v 2500k \
          -maxrate 2500k -bufsize 5000k -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -t 06:00:00 -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
