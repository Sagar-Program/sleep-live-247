name: 24/7 Guaranteed Live

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Infinite Stream
        run: |
          # 1. This creates a dark blue background (color=0x000814)
          # 2. This creates "Pink Noise" (the most relaxing sleep sound)
          # 3. It mixes them together and streams them forever.
          ffmpeg -re -f lavfi -i "color=c=0x000814:s=1280x720:rate=30" \
          -f lavfi -i "anoisesrc=color=pink:sample_rate=44100:amplitude=0.5" \
          -c:v libx264 -preset superfast -tune stillimage -b:v 2500k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
