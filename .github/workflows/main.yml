name: 24/7 Force Stream

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Reliable Video
        run: wget -O video.mp4 'https://github.com/intel-iot-devkit/sample-videos/raw/master/classroom.mp4'

      - name: Run Stream Script
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: python3 stream.py
