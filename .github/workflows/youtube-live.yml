name: YouTube 24x7 Stream

on:
  workflow_dispatch:

concurrency:
  group: youtube-live-stream
  cancel-in-progress: true

jobs:
  stream:
    runs-on: self-hosted
    timeout-minutes: 4320
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dependencies on self-hosted runner
        run: |
          set -euo pipefail
          command -v ffmpeg
          command -v ffprobe
          command -v python3

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f sleep_loop.mp4
          test -f templates/stream_clean.py

      - name: Restore canonical stream.py
        run: |
          set -euo pipefail
          cp templates/stream_clean.py stream.py

      - name: Verify stream.py syntax
        run: |
          set -euo pipefail
          python3 -m py_compile stream.py

      - name: Start YouTube stream loop
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          set -euo pipefail
          python3 stream.py
