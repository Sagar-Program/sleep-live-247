name: YouTube Daily 5h (Hosted)

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 18:00 UTC
    - cron: '0 18 * * *'

concurrency:
  group: youtube-daily-5h
  cancel-in-progress: true

jobs:
  stream_daily:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg + Python
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f sleep_loop.mp4
          python3 -m py_compile stream.py


      - name: Generate clean stream.py from embedded source
        run: |
          set -euo pipefail
          cat > stream.py <<'PYCODE'
import os
import subprocess
import sys
import time
from pathlib import Path

INPUT_FILE = Path("sleep_loop.mp4")
NORMALIZED_FILE = Path("stream_ready.mp4")
ENDPOINTS = [
    "rtmps://a.rtmp.youtube.com:443/live2",
    "rtmp://a.rtmp.youtube.com/live2",
]


def run(cmd):
    print("+", " ".join(cmd), flush=True)
    return subprocess.run(cmd)


def fail(msg: str) -> None:
    print(f"ERROR: {msg}", flush=True)
    sys.exit(1)


def get_stream_key() -> str:
    raw = os.getenv("YOUTUBE_STREAM_KEY", "")
    key = raw.replace("\r", "").replace("\n", "").strip()
    if not key:
        fail("YOUTUBE_STREAM_KEY secret is missing/empty")
    if " " in key:
        fail("YOUTUBE_STREAM_KEY contains spaces; paste only raw key")
    print(f"INFO: stream key loaded (length={len(key)})", flush=True)
    return key


def validate_input() -> None:
    if not INPUT_FILE.exists():
        fail("sleep_loop.mp4 was not found")

    p = run(["ffprobe", "-v", "error", "-show_format", "-show_streams", str(INPUT_FILE)])
    if p.returncode != 0:
        fail("sleep_loop.mp4 is unreadable/corrupted")


def normalize_media() -> None:
    # Create a clean, stable MP4 with H.264 + AAC.
    # If source has no audio, add silent stereo track.
    cmd = [
        "ffmpeg", "-y", "-v", "warning",
        "-i", str(INPUT_FILE),
        "-f", "lavfi", "-i", "anullsrc=channel_layout=stereo:sample_rate=44100",
        "-map", "0:v:0", "-map", "0:a?", "-map", "1:a",
        "-c:v", "libx264", "-preset", "veryfast", "-r", "30", "-g", "60", "-pix_fmt", "yuv420p",
        "-c:a", "aac", "-b:a", "128k", "-ar", "44100",
        "-shortest", "-movflags", "+faststart",
        str(NORMALIZED_FILE),
    ]
    p = run(cmd)
    if p.returncode != 0:
        fail("failed to normalize video/audio")


def publish_forever(stream_key: str) -> None:
    while True:
        for endpoint in ENDPOINTS:
            url = f"{endpoint}/{stream_key}"
            print(f"INFO: publishing to {endpoint}", flush=True)
            cmd = [
                "ffmpeg", "-hide_banner", "-loglevel", "info",
                "-re", "-stream_loop", "-1", "-i", str(NORMALIZED_FILE),
                "-c", "copy",
                "-f", "flv", url,
            ]
            code = run(cmd).returncode
            print(f"WARN: ffmpeg exited with code {code}; retrying in 5s", flush=True)
            time.sleep(5)


def main() -> None:
    key = get_stream_key()
    validate_input()
    normalize_media()
    publish_forever(key)


if __name__ == "__main__":
    main()
PYCODE

      - name: Detect accidental diff-text corruption
        run: |
          set -euo pipefail
          if head -n 5 stream.py | grep -Eq '^(diff --git|index [0-9a-f]{7,})'; then
            echo "ERROR: stream.py contains diff text"
            exit 1
          fi

      - name: Verify stream.py syntax
        run: |
          set -euo pipefail
          python3 -m py_compile stream.py

      - name: Run stream for up to 5 hours
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          set -euo pipefail
          python3 stream.py
