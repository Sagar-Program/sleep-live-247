name: YouTube Daily 5h (Hosted)

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 18:00 UTC
    - cron: '0 18 * * *'

concurrency:
  group: youtube-daily-5h
  cancel-in-progress: true

jobs:
  stream_daily:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg + Python
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f sleep_loop.mp4
          python3 -m py_compile stream.py


      - name: Restore canonical stream.py before run
        run: |
          set -euo pipefail
          cp templates/stream_clean.py stream.py

      - name: Detect accidental diff-text corruption
        run: |
          set -euo pipefail
          if head -n 5 stream.py | grep -Eq '^(diff --git|index [0-9a-f]{7,})'; then
            echo "ERROR: stream.py still contains diff text after restore"
            exit 1
          fi

      - name: Run stream for up to 5 hours
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          set -euo pipefail
          python3 stream.py
